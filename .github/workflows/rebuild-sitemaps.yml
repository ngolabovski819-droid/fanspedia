name: Rebuild Sitemaps on Blog Change

on:
  push:
    branches: [ main ]
    paths:
      - 'content/blog/**'

jobs:
  rebuild-sitemaps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild sitemaps
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node scripts/build-sitemaps.cjs

      - name: Commit updated sitemaps
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap_base.xml sitemap_base_es.xml sitemap-index.xml sitemap.xml
          git diff --cached --quiet || git commit -m "chore: rebuild sitemaps after blog update [skip ci]"
          git push
