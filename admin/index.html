<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>FansPedia CMS</title>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@3.0.2/dist/decap-cms.js"></script>
  <script>
    // ─── Smart paste: HTML table → Markdown table ───────────────────────────
    // Uses CAPTURE phase so we intercept before CodeMirror (raw mode editor) or
    // any textarea processes the paste. When clipboard HTML has a <table>, we
    // convert it to a markdown table and inject it via CodeMirror's API or the
    // native textarea API.
    function htmlTablesToMarkdown(html) {
      var parser = new DOMParser();
      var doc = parser.parseFromString(html, 'text/html');
      var tables = Array.from(doc.querySelectorAll('table'));
      if (!tables.length) return null;

      tables.forEach(function(table) {
        var rows = Array.from(table.querySelectorAll('tr'));
        if (!rows.length) return;

        var mdRows = rows.map(function(row) {
          var cells = Array.from(row.querySelectorAll('th,td'));
          return '| ' + cells.map(function(c) {
            return (c.innerText || c.textContent || '').trim()
              .replace(/\|/g, '\\|').replace(/\r?\n/g, ' ');
          }).join(' | ') + ' |';
        });

        var colCount = table.querySelector('tr').querySelectorAll('th,td').length;
        var sep = '| ' + Array(colCount).fill('---').join(' | ') + ' |';
        mdRows.splice(1, 0, sep);

        var placeholder = document.createTextNode('\n\n' + mdRows.join('\n') + '\n\n');
        table.parentNode.replaceChild(placeholder, table);
      });

      return (doc.body.innerText || doc.body.textContent || '').trim();
    }

    // Capture phase = fires before the editor's own paste listener
    document.addEventListener('paste', function(e) {
      var html = e.clipboardData && e.clipboardData.getData('text/html');
      if (!html || !html.toLowerCase().includes('<table')) return;

      var pasteText;
      try { pasteText = htmlTablesToMarkdown(html); } catch(err) { return; }
      if (!pasteText) return;

      var target = e.target;

      // ── CodeMirror path (older Decap CMS versions) ─────────────────────────
      var cmEl = document.querySelector('.CodeMirror.CodeMirror-focused');
      if (!cmEl && target && target.closest) cmEl = target.closest('.CodeMirror');
      if (cmEl && cmEl.CodeMirror) {
        e.preventDefault();
        cmEl.CodeMirror.replaceSelection(pasteText, 'end');
        return;
      }

      // ── contenteditable path (Decap CMS 3.x uses Plate.js — no CodeMirror) ─
      var editableEl = null;
      if (target) {
        if (target.isContentEditable) {
          editableEl = target;
        } else if (target.closest) {
          editableEl = target.closest('[contenteditable="true"]');
        }
      }
      if (editableEl) {
        e.preventDefault();
        // execCommand fires a DOM mutation that Plate.js / React picks up via onChange
        document.execCommand('insertText', false, pasteText);
        return;
      }

      // ── Textarea fallback ──────────────────────────────────────────────────
      if (!target || target.tagName !== 'TEXTAREA') return;
      e.preventDefault();

      var start  = target.selectionStart || 0;
      var end2   = target.selectionEnd   || 0;
      var newVal = target.value.substring(0, start) + pasteText + target.value.substring(end2);

      var setter = Object.getOwnPropertyDescriptor(HTMLTextAreaElement.prototype, 'value').set;
      setter.call(target, newVal);
      target.dispatchEvent(new Event('input', { bubbles: true }));
      target.selectionStart = target.selectionEnd = start + pasteText.length;
    }, true); // <-- true = capture phase, fires before editor handlers
    // ────────────────────────────────────────────────────────────────────────
    // Register Table editor component — shows as "Table" button in toolbar
    CMS.registerEditorComponent({
      id: 'table',
      label: 'Table',
      icon: 'table',
      fields: [
        { name: 'headers', label: 'Column Headers (comma-separated)', widget: 'string', hint: 'e.g. Name, Price, Rating' },
        { name: 'rows', label: 'Rows (one row per line, cells comma-separated)', widget: 'text', hint: 'e.g.\nAlice, $9.99, ⭐⭐⭐\nBob, Free, ⭐⭐⭐⭐⭐' }
      ],
      pattern: /^\|[^\n]+\|\n\|[-| :]+\|\n((\|[^\n]+\|\n?)*)/m,
      fromBlock: function(match) { return { headers: '', rows: '' }; },
      toBlock: function(data) {
        var cols = (data.headers || '').split(',').map(function(h) { return h.trim(); }).filter(Boolean);
        if (!cols.length) return '';
        var headerRow = '| ' + cols.join(' | ') + ' |';
        var sepRow    = '| ' + cols.map(function() { return '---'; }).join(' | ') + ' |';
        var bodyRows  = (data.rows || '').split('\n').filter(function(r) { return r.trim(); }).map(function(r) {
          var cells = r.split(',').map(function(c) { return c.trim(); });
          // pad missing cells
          while (cells.length < cols.length) cells.push('');
          return '| ' + cells.join(' | ') + ' |';
        }).join('\n');
        return headerRow + '\n' + sepRow + (bodyRows ? '\n' + bodyRows : '');
      },
      toPreview: function(data) {
        var cols = (data.headers || '').split(',').map(function(h) { return h.trim(); }).filter(Boolean);
        if (!cols.length) return '<em>Table preview</em>';
        var ths = cols.map(function(c) { return '<th>' + c + '</th>'; }).join('');
        return '<table border="1" style="border-collapse:collapse;width:100%"><thead><tr>' + ths + '</tr></thead></table>';
      }
    });

    CMS.init({
      config: {
        load_config_file: false,
        publish_mode: 'simple',
        backend: {
          name: 'github',
          repo: 'ngolabovski819-droid/fanspedia',
          branch: 'main',
          base_url: 'https://fanspedia.net',
          auth_endpoint: 'api/oauth/authorize'
        },
        media_folder: 'uploads',
        public_folder: '/uploads',
        collections: [
          {
            name: 'blog',
            label: 'Blog Posts',
            folder: 'content/blog',
            create: true,
            slug: '{{fields.slug}}',
            extension: 'md',
            format: 'frontmatter',
            identifier_field: 'slug',
            editor: { preview: false },
            fields: [
              { label: 'Title', name: 'title', widget: 'string' },
              { label: 'URL Slug', name: 'slug', widget: 'string', hint: 'The URL path for this post, e.g. my-post-title — lowercase letters, numbers and hyphens only. Cannot be changed after publishing (would break the URL).', pattern: ['^[a-z0-9][a-z0-9-]*[a-z0-9]$', 'Lowercase letters, numbers, and hyphens only (no leading/trailing hyphens)'] },
              { label: 'Date', name: 'date', widget: 'datetime', format: 'YYYY-MM-DD', date_format: 'YYYY-MM-DD', time_format: false },
              {
                label: 'Category', name: 'category', widget: 'select',
                options: [
                  { label: 'Guides', value: 'guides' },
                  { label: 'Tips', value: 'tips' },
                  { label: 'News', value: 'news' },
                  { label: 'Creators', value: 'creators' },
                  { label: 'How-To', value: 'how-to' }
                ]
              },
              { label: 'Category Label', name: 'categoryLabel', widget: 'string', hint: "Display label e.g. 'Guides', 'Tips'" },
              { label: 'Emoji', name: 'emoji', widget: 'string', required: false, hint: 'Optional. Leave blank if you use featured images.' },
              { label: 'Read Time', name: 'read_time', widget: 'string', hint: "e.g. '5 min read'" },
              { label: 'Excerpt', name: 'excerpt', widget: 'text', required: false, hint: 'Short summary shown in the blog listing card (1-2 sentences). Leave blank to auto-generate from body.' },
              { label: 'Featured Image', name: 'featured_image', widget: 'image', required: false, hint: 'Upload a 16:9 hero image (recommended: 1200×675px). Leave blank to show emoji instead.' },
              { label: 'Featured Image Alt Text', name: 'featured_image_alt', widget: 'string', required: false, hint: 'Descriptive alt text for the featured image (for accessibility and SEO)' },
              { label: 'SEO Title', name: 'seo_title', widget: 'string', required: false, hint: 'Overrides the browser tab title for SEO (50-60 chars). Leave blank to use the post title.' },
              { label: 'Meta Description', name: 'meta_description', widget: 'text', required: false, hint: 'Shown in Google search results (150-160 chars). Leave blank to use the excerpt.' },
              { label: 'Body', name: 'body', widget: 'markdown', default_mode: 'raw', modes: ['rich_text', 'raw'], buttons: ['bold', 'italic', 'code', 'link', 'heading-one', 'heading-two', 'heading-three', 'bulleted-list', 'numbered-list', 'quote', 'code-block'], hint: 'Raw mode is default. Paste from Google Docs here — tables paste automatically as markdown tables.' }
            ]
          }
        ]
      }
    });
  </script>
</body>
</html>
