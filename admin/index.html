<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>FansPedia CMS</title>
</head>
<body>
  <script>window.CMS_MANUAL_INIT = true;</script>
  <script src="https://unpkg.com/decap-cms@3.0.2/dist/decap-cms.js"></script>
  <script>
    // ─── Full HTML → Markdown converter for Google Docs paste ───────────────
    // Handles: h1-h6, p, ul/ol/li, strong/em/b/i, a, table, br, hr, blockquote
    // Intercepts ALL pastes that contain HTML (not just tables).

    function nodeToMarkdown(node, ctx) {
      ctx = ctx || { listDepth: 0, orderedCounters: [] };
      if (node.nodeType === 3) { // text node
        return node.textContent.replace(/\r?\n/g, ' ');
      }
      if (node.nodeType !== 1) return '';
      var tag = node.tagName.toLowerCase();
      var children = Array.from(node.childNodes);

      function inner() {
        return children.map(function(c) { return nodeToMarkdown(c, ctx); }).join('');
      }
      function blockInner() {
        return children.map(function(c) { return nodeToMarkdown(c, ctx); }).join('').trim();
      }

      // Headings
      if (tag === 'h1') return '\n\n# ' + blockInner() + '\n\n';
      if (tag === 'h2') return '\n\n## ' + blockInner() + '\n\n';
      if (tag === 'h3') return '\n\n### ' + blockInner() + '\n\n';
      if (tag === 'h4') return '\n\n#### ' + blockInner() + '\n\n';
      if (tag === 'h5') return '\n\n##### ' + blockInner() + '\n\n';
      if (tag === 'h6') return '\n\n###### ' + blockInner() + '\n\n';

      // Paragraphs / divs / sections
      if (tag === 'p') {
        var t = blockInner();
        return t ? '\n\n' + t + '\n\n' : '';
      }
      if (tag === 'div' || tag === 'section' || tag === 'article') {
        var t2 = inner();
        // only wrap in newlines if it looks block-level (has sub-blocks)
        return /\n/.test(t2) ? t2 : '\n\n' + t2.trim() + '\n\n';
      }

      // Inline formatting
      if (tag === 'strong' || tag === 'b') return '**' + inner().trim() + '**';
      if (tag === 'em' || tag === 'i') return '*' + inner().trim() + '*';
      if (tag === 'code') return '`' + node.textContent + '`';
      if (tag === 'del' || tag === 's') return '~~' + inner().trim() + '~~';
      if (tag === 'br') return '\n';
      if (tag === 'hr') return '\n\n---\n\n';

      // Links
      if (tag === 'a') {
        var href = node.getAttribute('href') || '';
        var text = inner().trim();
        if (!href || href === text) return text;
        return '[' + text + '](' + href + ')';
      }

      // Images
      if (tag === 'img') {
        var src  = node.getAttribute('src') || '';
        var alt2 = node.getAttribute('alt') || '';
        return src ? '![' + alt2 + '](' + src + ')' : '';
      }

      // Lists
      if (tag === 'ul' || tag === 'ol') {
        ctx.listDepth++;
        if (tag === 'ol') ctx.orderedCounters[ctx.listDepth] = 0;
        var result = children.map(function(c) { return nodeToMarkdown(c, ctx); }).join('');
        ctx.listDepth--;
        if (tag === 'ol') delete ctx.orderedCounters[ctx.listDepth + 1];
        return '\n' + result + '\n';
      }
      if (tag === 'li') {
        var indent = '  '.repeat(Math.max(0, ctx.listDepth - 1));
        var parentTag = node.parentElement && node.parentElement.tagName.toLowerCase();
        var bullet;
        if (parentTag === 'ol') {
          ctx.orderedCounters[ctx.listDepth] = (ctx.orderedCounters[ctx.listDepth] || 0) + 1;
          bullet = ctx.orderedCounters[ctx.listDepth] + '.';
        } else {
          bullet = '-';
        }
        var liContent = children.map(function(c) { return nodeToMarkdown(c, ctx); }).join('').trim();
        return indent + bullet + ' ' + liContent + '\n';
      }

      // Blockquote
      if (tag === 'blockquote') {
        var lines = blockInner().split('\n');
        return '\n\n' + lines.map(function(l) { return '> ' + l; }).join('\n') + '\n\n';
      }

      // Pre / code block
      if (tag === 'pre') {
        return '\n\n```\n' + node.textContent.trim() + '\n```\n\n';
      }

      // Table
      if (tag === 'table') {
        var rows = Array.from(node.querySelectorAll('tr'));
        if (!rows.length) return '';
        var mdRows = rows.map(function(row) {
          var cells = Array.from(row.querySelectorAll('th,td'));
          return '| ' + cells.map(function(c) {
            return (c.innerText || c.textContent || '').trim()
              .replace(/\|/g, '\\|').replace(/\r?\n/g, ' ');
          }).join(' | ') + ' |';
        });
        var colCount = rows[0].querySelectorAll('th,td').length;
        var sep = '| ' + Array(colCount).fill('---').join(' | ') + ' |';
        mdRows.splice(1, 0, sep);
        return '\n\n' + mdRows.join('\n') + '\n\n';
      }

      // Skip style/script/meta noise
      if (tag === 'style' || tag === 'script' || tag === 'meta' || tag === 'head') return '';

      // Span and other inline wrappers — just pass through
      return inner();
    }

    function htmlToMarkdown(html) {
      var parser = new DOMParser();
      var doc = parser.parseFromString(html, 'text/html');
      var md = nodeToMarkdown(doc.body);
      // Collapse 3+ blank lines to 2
      return md.replace(/\n{3,}/g, '\n\n').trim();
    }

    // Capture phase — fires before Plate.js / CodeMirror handles the paste
    document.addEventListener('paste', function(e) {
      var html = e.clipboardData && e.clipboardData.getData('text/html');
      if (!html) return;
      // Only intercept if there's real rich content (not a plain URL paste etc.)
      if (!/<(h[1-6]|table|ul|ol|strong|em|b|i)\b/i.test(html)) return;

      var pasteText;
      try { pasteText = htmlToMarkdown(html); } catch(err) { return; }
      if (!pasteText) return;

      var target = e.target;

      // CodeMirror (older Decap versions)
      var cmEl = document.querySelector('.CodeMirror.CodeMirror-focused');
      if (!cmEl && target && target.closest) cmEl = target.closest('.CodeMirror');
      if (cmEl && cmEl.CodeMirror) {
        e.preventDefault();
        cmEl.CodeMirror.replaceSelection(pasteText, 'end');
        return;
      }

      // contenteditable (Decap CMS 3.x — Plate.js)
      var editableEl = null;
      if (target) {
        editableEl = target.isContentEditable ? target
          : (target.closest ? target.closest('[contenteditable="true"]') : null);
      }
      if (editableEl) {
        e.preventDefault();
        // DO NOT use execCommand — it mutates the Slate/Plate.js DOM directly,
        // corrupting Slate's internal node model and crashing on next toolbar use.
        // Instead, re-dispatch a synthetic paste event with ONLY text/plain so that
        // Plate.js inserts the markdown via its own safe Slate transforms.
        try {
          var dt = new DataTransfer();
          dt.setData('text/plain', pasteText);
          var newPaste = new ClipboardEvent('paste', {
            bubbles: true,
            cancelable: true,
            clipboardData: dt
          });
          editableEl.dispatchEvent(newPaste);
        } catch(err) {
          // absolute last resort — likely to cause state issues but prevents data loss
          document.execCommand('insertText', false, pasteText);
        }
        return;
      }

      // Textarea fallback
      if (!target || target.tagName !== 'TEXTAREA') return;
      e.preventDefault();
      var start  = target.selectionStart || 0;
      var end2   = target.selectionEnd   || 0;
      var newVal = target.value.substring(0, start) + pasteText + target.value.substring(end2);
      var setter = Object.getOwnPropertyDescriptor(HTMLTextAreaElement.prototype, 'value').set;
      setter.call(target, newVal);
      target.dispatchEvent(new Event('input', { bubbles: true }));
      target.selectionStart = target.selectionEnd = start + pasteText.length;
    }, true);
    // ────────────────────────────────────────────────────────────────────────
    // Register Table editor component — shows as "Table" button in toolbar
    CMS.registerEditorComponent({
      id: 'table',
      label: 'Table',
      icon: 'table',
      fields: [
        { name: 'headers', label: 'Column Headers (comma-separated)', widget: 'string', hint: 'e.g. Name, Price, Rating' },
        { name: 'rows', label: 'Rows (one row per line, cells comma-separated)', widget: 'text', hint: 'e.g.\nAlice, $9.99, ⭐⭐⭐\nBob, Free, ⭐⭐⭐⭐⭐' }
      ],
      pattern: /^\|[^\n]+\|\n\|[-| :]+\|\n((\|[^\n]+\|\n?)*)/m,
      fromBlock: function(match) { return { headers: '', rows: '' }; },
      toBlock: function(data) {
        var cols = (data.headers || '').split(',').map(function(h) { return h.trim(); }).filter(Boolean);
        if (!cols.length) return '';
        var headerRow = '| ' + cols.join(' | ') + ' |';
        var sepRow    = '| ' + cols.map(function() { return '---'; }).join(' | ') + ' |';
        var bodyRows  = (data.rows || '').split('\n').filter(function(r) { return r.trim(); }).map(function(r) {
          var cells = r.split(',').map(function(c) { return c.trim(); });
          // pad missing cells
          while (cells.length < cols.length) cells.push('');
          return '| ' + cells.join(' | ') + ' |';
        }).join('\n');
        return headerRow + '\n' + sepRow + (bodyRows ? '\n' + bodyRows : '');
      },
      toPreview: function(data) {
        var cols = (data.headers || '').split(',').map(function(h) { return h.trim(); }).filter(Boolean);
        if (!cols.length) return '<em>Table preview</em>';
        var ths = cols.map(function(c) { return '<th>' + c + '</th>'; }).join('');
        return '<table border="1" style="border-collapse:collapse;width:100%"><thead><tr>' + ths + '</tr></thead></table>';
      }
    });

    // ─── Preview styles loaded from external CSS file ─────────────────────
    CMS.registerPreviewStyle('/admin/preview.css');
    // ──────────────────────────────────────────────────────────────────────

    CMS.init({
      config: {
        load_config_file: false,
        publish_mode: 'simple',
        backend: {
          name: 'github',
          repo: 'ngolabovski819-droid/fanspedia',
          branch: 'main',
          base_url: 'https://fanspedia.net',
          auth_endpoint: 'api/oauth/authorize'
        },
        media_folder: 'uploads',
        public_folder: '/uploads',
        collections: [
          {
            name: 'blog',
            label: 'Blog Posts',
            folder: 'content/blog',
            create: true,
            slug: '{{fields.slug}}',
            extension: 'md',
            format: 'frontmatter',
            identifier_field: 'slug',
            editor: { preview: true },
            fields: [
              { label: 'Title', name: 'title', widget: 'string' },
              { label: 'URL Slug', name: 'slug', widget: 'string', hint: 'The URL path for this post, e.g. my-post-title — lowercase letters, numbers and hyphens only. Cannot be changed after publishing (would break the URL).', pattern: ['^[a-z0-9][a-z0-9-]*[a-z0-9]$', 'Lowercase letters, numbers, and hyphens only (no leading/trailing hyphens)'] },
              { label: 'Date', name: 'date', widget: 'datetime', format: 'YYYY-MM-DD', date_format: 'YYYY-MM-DD', time_format: false },
              {
                label: 'Category', name: 'category', widget: 'select',
                options: [
                  { label: 'Guides', value: 'guides' },
                  { label: 'Tips', value: 'tips' },
                  { label: 'News', value: 'news' },
                  { label: 'Creators', value: 'creators' },
                  { label: 'How-To', value: 'how-to' }
                ]
              },
              { label: 'Category Label', name: 'categoryLabel', widget: 'string', hint: "Display label e.g. 'Guides', 'Tips'" },
              { label: 'Emoji', name: 'emoji', widget: 'string', required: false, hint: 'Optional. Leave blank if you use featured images.' },
              { label: 'Read Time', name: 'read_time', widget: 'string', hint: "e.g. '5 min read'" },
              { label: 'Excerpt', name: 'excerpt', widget: 'text', required: false, hint: 'Short summary shown in the blog listing card (1-2 sentences). Leave blank to auto-generate from body.' },
              { label: 'Featured Image', name: 'featured_image', widget: 'image', required: false, hint: 'Upload a 16:9 hero image (recommended: 1200×675px). Leave blank to show emoji instead.' },
              { label: 'Featured Image Alt Text', name: 'featured_image_alt', widget: 'string', required: false, hint: 'Descriptive alt text for the featured image (for accessibility and SEO)' },
              { label: 'SEO Title', name: 'seo_title', widget: 'string', required: false, hint: 'Overrides the browser tab title for SEO (50-60 chars). Leave blank to use the post title.' },
              { label: 'Meta Description', name: 'meta_description', widget: 'text', required: false, hint: 'Shown in Google search results (150-160 chars). Leave blank to use the excerpt.' },
              { label: 'Body', name: 'body', widget: 'markdown', default_mode: 'raw', modes: ['rich_text', 'raw'], buttons: ['bold', 'italic', 'code', 'link', 'heading-one', 'heading-two', 'heading-three', 'bulleted-list', 'numbered-list', 'quote', 'code-block'], hint: 'Raw mode is default. Paste from Google Docs here — tables paste automatically as markdown tables.' }
            ]
          }
        ]
      }
    });
  </script>
</body>
</html>
